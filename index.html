<script>
const GAP_COLORS = {
  missing_in_bank: '#ff4d6d',
  missing_in_platform: '#ff8547',
  amount_mismatch: '#ffb347',
  date_mismatch: '#4d9fff',
  duplicate_platform: '#b47fff',
  reversed_bank: '#39e09b',
};

let allFindings = [], filtered = [], currentPage = 1, perPage = 15;

// ✅ MAIN FUNCTION (NOW SUPPORTS FILE UPLOAD)
async function runReconcile() {
  const btn = document.getElementById('run-btn');
  const spinner = document.getElementById('spinner');

  btn.disabled = true;
  spinner.style.display = 'inline-block';

  try {
    const fileInput = document.querySelector('input[type="file"]');

    // ✅ IF FILE EXISTS → SEND TO BACKEND
    if (fileInput && fileInput.files.length > 0) {
      const formData = new FormData();
      formData.append("file", fileInput.files[0]);

      const res = await fetch("/api/reconcile", {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      renderResults(data);

    } else {
      // ✅ OTHERWISE → USE EXISTING API (SIMULATION)
      const n_clean = document.getElementById('sl-clean').value;
      const n_gaps  = document.getElementById('sl-gaps').value;

      const res = await fetch(`/api/reconcile?n_clean=${n_clean}&n_gaps=${n_gaps}`);
      const data = await res.json();
      renderResults(data);
    }

    document.getElementById('results').style.display = 'block';

  } catch (e) {
    alert("Error connecting to backend. Using demo mode.");
    renderResults(generateDemo(100, 30));
    document.getElementById('results').style.display = 'block';
  }

  btn.disabled = false;
  spinner.style.display = 'none';
}

// ✅ RENDER RESULTS
function renderResults(data) {
  const s = data.summary;

  document.getElementById('kpi-ptxn').textContent = s.platform_txn_count;
  document.getElementById('kpi-btxn').textContent = s.bank_txn_count;
  document.getElementById('kpi-gaps').textContent = s.total_gaps_found;
  document.getElementById('kpi-disc').textContent = s.net_discrepancy;

  allFindings = data.findings;
  filtered = allFindings;
  renderTable();
}

// ✅ TABLE RENDER
function renderTable() {
  const tbody = document.getElementById('tbl-body');
  tbody.innerHTML = '';

  filtered.slice(0, perPage).forEach(f => {
    tbody.innerHTML += `
      <tr>
        <td>${f.txn_id}</td>
        <td>${f.merchant}</td>
        <td>${f.date}</td>
        <td>${f.amount}</td>
        <td>${f.currency}</td>
        <td>${f.issue}</td>
        <td>${f.severity}</td>
        <td>${f.detail}</td>
      </tr>
    `;
  });
}

// ✅ DEMO FALLBACK
function generateDemo(nClean, nGaps) {
  return {
    summary: {
      platform_txn_count: nClean,
      bank_txn_count: nClean - 5,
      total_gaps_found: nGaps,
      net_discrepancy: "-5000"
    },
    findings: [
      {
        txn_id: "TXN001",
        merchant: "DemoStore",
        date: "2024-03-01",
        amount: 1000,
        currency: "INR",
        issue: "missing_in_bank",
        severity: "high",
        detail: "Demo data"
      }
    ]
  };
}
</script>
